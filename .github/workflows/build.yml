name: Build & Release

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew build

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep "^version = " build.gradle | sed "s/version = '//;s/'//")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT

      - name: Upload artifact (PRs)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: questsExtras-${{ steps.version.outputs.version }}
          path: build/libs/questsExtras-${{ steps.version.outputs.version }}.jar
          retention-days: 7

      - name: Create GitHub Release (main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: questsExtras ${{ steps.version.outputs.version }}
          files: build/libs/questsExtras-${{ steps.version.outputs.version }}.jar
          generate_release_notes: true
          fail_on_unmatched_files: true
